name: Build Plugin

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      plugin_version: ${{ steps.version.outputs.plugin_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Calculate plugin version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(grep '^pluginBaseVersion=' gradle.properties | cut -d= -f2)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "Invalid pluginBaseVersion '$BASE_VERSION'. Expected numeric major.minor.patch." >&2
            exit 1
          fi

          PATCH=$((PATCH + GITHUB_RUN_NUMBER))
          MINOR=$((MINOR + PATCH / 10))
          PATCH=$((PATCH % 10))
          MAJOR=$((MAJOR + MINOR / 10))
          MINOR=$((MINOR % 10))

          echo "plugin_version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: ./gradlew build -PpluginVersion=${{ steps.version.outputs.plugin_version }}

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightweightClans-${{ steps.version.outputs.plugin_version }}
          path: build/libs/LightweightClans-${{ steps.version.outputs.plugin_version }}.jar
          if-no-files-found: error
          retention-days: 14

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: LightweightClans-${{ needs.build.outputs.plugin_version }}
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.plugin_version }}
          name: Lightweight Clans ${{ needs.build.outputs.plugin_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/LightweightClans-${{ needs.build.outputs.plugin_version }}.jar
          fail_on_unmatched_files: true
          overwrite_files: true
