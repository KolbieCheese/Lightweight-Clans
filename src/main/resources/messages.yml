general:
  prefix: "<gold><bold>Clans</bold></gold><gray> > </gray>"

errors:
  player-only: "<prefix><red>Only players can use this command.</red>"
  no-permission: "<prefix><red>You do not have permission to do that.</red>"
  unknown-subcommand: "<prefix><red>Unknown subcommand. Use <yellow>/clan help</yellow><red>.</red>"
  internal: "<prefix><red>Something went wrong while handling that clan action.</red>"
  usage: "<prefix><yellow>Usage: <usage></yellow>"

usage:
  help: "/clan help"
  create: "/clan create <clan name>"
  invite: "/clan invite <player>"
  accept: "/clan accept <clan name>"
  deny: "/clan deny <clan name>"
  leave: "/clan leave"
  get: "/clan get <clan name> <info|members>"
  chat: "/clan chat <message>"
  chat-toggle: "/clan chat toggle"
  rename: "/clan rename <new clan name>"
  tag: "/clan tag <new tag>"
  color: "/clan color <named color|#RRGGBB>"
  transfer: "/clan transfer <player>"
  kick: "/clan kick <player>"
  disband: "/clan disband"

common:
  no-clan: "<prefix><red>You are not in a clan.</red>"
  already-in-clan: "<prefix><red>You are already in a clan.</red>"
  not-president: "<prefix><red>Only the clan President can do that.</red>"
  clan-full: "<prefix><red>Your clan is already full.</red>"
  player-offline: "<prefix><red>That player must be online for this action.</red>"
  self-target: "<prefix><red>You cannot target yourself with that command.</red>"
  not-in-your-clan: "<prefix><red>That player is not in your clan.</red>"
  target-is-president: "<prefix><red>You cannot do that to the clan President.</red>"

validation:
  invalid-name: "<prefix><red>Clan names may only use letters, numbers, spaces, underscores, and hyphens.</red>"
  name-too-long: "<prefix><red>Clan names cannot be longer than <max> characters.</red>"
  invalid-tag: "<prefix><red>Clan tags may only use letters and numbers.</red>"
  tag-too-long: "<prefix><red>Clan tags cannot be longer than <max> characters.</red>"
  restricted-name: "<prefix><red>That clan name is not allowed by server moderation rules.</red>"
  restricted-tag: "<prefix><red>That clan tag is not allowed by server moderation rules.</red>"
  invalid-color: "<prefix><red><color> is not a valid clan color. Use a named Minecraft color like <white>gold</white> or <white>dark_red</white>, or use <white>#RRGGBB</white>.</red>"

help:
  lines:
    - "<gold><bold>CustomClans Commands</bold></gold>"
    - "<yellow>/clan help</yellow><gray> - Show this help list.</gray>"
    - "<yellow>/clan create <clan name></yellow><gray> - Create a new clan and become its President.</gray>"
    - "<yellow>/clan invite <player></yellow><gray> - Invite an online player to your clan (any clan member).</gray>"
    - "<yellow>/clan accept <clan name></yellow><gray> - Accept an invite from that clan by name.</gray>"
    - "<yellow>/clan deny <clan name></yellow><gray> - Deny an invite from that clan by name.</gray>"
    - "<yellow>/clan leave</yellow><gray> - Leave your current clan (President must transfer or disband first).</gray>"
    - "<yellow>/clan get <clan name> info</yellow><gray> - Publicly view clan name, tag, color, President, and member counts.</gray>"
    - "<yellow>/clan get <clan name> members</yellow><gray> - Publicly view clan members and the current President.</gray>"
    - "<yellow>/clan chat <message></yellow><gray> - Send a clan-only message (any clan member).</gray>"
    - "<yellow>/clan chat toggle</yellow><gray> - Toggle clan chat mode (any clan member).</gray>"
    - "<yellow>/clan rename <new clan name></yellow><gray> - Rename your clan (President only).</gray>"
    - "<yellow>/clan tag <new tag></yellow><gray> - Change your clan tag (President only).</gray>"
    - "<yellow>/clan color <named color|#RRGGBB></yellow><gray> - Change your clan tag color using a named color or hex (President only).</gray>"
    - "<yellow>/clan transfer <player></yellow><gray> - Transfer the presidency (President only).</gray>"
    - "<yellow>/clan kick <player></yellow><gray> - Remove a member from your clan (President only).</gray>"
    - "<yellow>/clan disband</yellow><gray> - Delete your clan (President only).</gray>"

create:
  success: "<prefix><green>Created clan <white><name></white> with tag <white>[<tag>]</white>.</green>"
  name-taken: "<prefix><red>Sorry, that clan name is taken.</red>"

accept:
  no-invite: "<prefix><red>You do not have an active invite from that clan.</red>"
  expired: "<prefix><red>Your invite from <white><clan></white> has expired.</red>"
  clan-missing: "<prefix><red>That clan no longer exists.</red>"
  already-in-clan: "<prefix><red>You joined a clan before accepting that invite.</red>"
  clan-full: "<prefix><red>That clan is full.</red>"
  success: "<prefix><green>You joined <white><clan></white>.</green>"

deny:
  no-invite: "<prefix><red>You do not have an active invite from that clan.</red>"
  expired: "<prefix><red>Your invite from <white><clan></white> had already expired.</red>"
  success: "<prefix><yellow>You denied the invite from <white><clan></white>.</yellow>"

leave:
  president-cannot-leave: "<prefix><red>You must transfer leadership or disband the clan before leaving.</red>"
  success: "<prefix><yellow>You left <white><clan></white>.</yellow>"

lookup:
  not-found: "<prefix><red>Sorry, no clan named <white><name></white> exists.</red>"

info:
  header: "<gold><bold>Clan Info</bold></gold>"
  lines:
    - "<gray>Name: <white><name></white>"
    - "<gray>Tag: <white>[<tag>]</white>"
    - "<gray>Color: <white><color></white>"
    - "<gray>President: <white><president></white>"
    - "<gray>Members: <white><member_count>/<max_members></white>"
    - "<gray>Online: <white><online_count></white>"

members:
  header: "<gold><bold>Clan Members</bold></gold>"
  president-line: "<gray>- <gold><name></gold> <dark_gray>(President)</dark_gray>"
  member-line: "<gray>- <white><name></white>"

chat:
  no-message: "<prefix><red>You must provide a clan chat message.</red>"
  unavailable: "<prefix><red>Clan chat is disabled in the config.</red>"
  toggle-unavailable: "<prefix><red>Clan chat toggle is disabled in the config.</red>"
  toggle-on: "<prefix><green>Clan chat toggle enabled.</green>"
  toggle-off: "<prefix><yellow>Clan chat toggle disabled.</yellow>"

invite:
  sent: "<prefix><green>Invited <white><player></white> to <white><clan></white>.</green>"
  received: "<prefix><gold><player></gold><gray> invited you to join <white><clan></white><gray>. Use <yellow>/clan accept <clan></yellow><gray> or <yellow>/clan deny <clan></yellow><gray>. This invite expires in <white><seconds></white><gray> seconds.</gray>"
  self: "<prefix><red>You cannot invite yourself.</red>"
  target-in-clan: "<prefix><red><player> is already in a clan.</red>"
  duplicate: "<prefix><red><player> already has an active invite from your clan.</red>"

rename:
  success: "<prefix><green>Renamed your clan to <white><name></white>.</green>"
  name-taken: "<prefix><red>Sorry, that clan name is taken.</red>"

tag:
  success: "<prefix><green>Updated your clan tag to <white>[<tag>]</white>.</green>"

color:
  success: "<prefix><green>Updated your clan tag color to <white><color></white>.</green>"

kick:
  success-self: "<prefix><yellow>You kicked <white><player></white> from the clan.</yellow>"
  success-target: "<prefix><red>You were removed from <white><clan></white>.</red>"

transfer:
  success-self: "<prefix><green>You transferred the presidency to <white><player></white>.</green>"
  success-target: "<prefix><gold>You are now the President of <white><clan></white>.</gold>"

disband:
  success-self: "<prefix><red>You disbanded <white><clan></white>.</red>"
  success-target: "<prefix><red><clan> was disbanded.</red>"
