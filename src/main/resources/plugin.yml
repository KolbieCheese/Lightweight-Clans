name: CustomClans
version: ${version}
main: io.github.maste.customclans.plugin.CustomClansPlugin
api-version: '1.21.11'
load: POSTWORLD
authors:
  - maste
description: Lightweight command-based clans plugin for Paper.
softdepend:
  - DiscordSRV
commands:
  clan:
    description: Root command for the CustomClans plugin.
    usage: /clan help
permissions:
  clans.use:
    description: Allows access to general clan commands.
    default: true
  clans.create:
    description: Allows players to create a clan.
    default: true
  clans.chat:
    description: Allows clan chat commands and toggle mode.
    default: true
  clans.invite:
    description: Allows clan invite commands.
    default: true
  clans.lookup:
    description: Allows public clan lookup commands.
    default: true
  clans.manage:
    description: Allows clan management commands. Players must still be the clan President.
    default: true
  clans.admin:
    description: Reserved for future admin and bypass features.
    default: op
  clans.admin.bypass.restricted-names:
    description: Bypasses restricted clan name/tag moderation checks.
    default: op
