name: LightweightClans
version: ${version}
main: io.github.maste.customclans.plugin.CustomClansPlugin
api-version: '1.21.11'
load: POSTWORLD
authors:
  - maste
description: Lightweight Clans is a lightweight command-based clans plugin for Paper.
softdepend:
  - DiscordSRV
commands:
  clan:
    description: Root command for the Lightweight Clans plugin.
    usage: /clan help
permissions:
  clans.use:
    description: Allows access to general clan commands.
    default: true
  clans.create:
    description: Allows players to create a clan.
    default: true
  clans.chat:
    description: Allows clan chat commands and toggle mode.
    default: true
  clans.invite:
    description: Allows clan invite commands.
    default: true
  clans.lookup:
    description: Allows public clan lookup and listing commands.
    default: true
  clans.manage:
    description: Allows clan management commands. Players must still be the clan President.
    default: true
  clans.admin:
    description: Allows access to admin clan commands and reload.
    default: op
  clans.admin.rename:
    description: Allows force-renaming any clan through /clan admin rename.
    default: op
  clans.admin.tag:
    description: Allows force-updating any clan tag through /clan admin tag.
    default: op
  clans.admin.color:
    description: Allows force-updating any clan color through /clan admin color.
    default: op
  clans.admin.setbanner:
    description: Allows force-updating any clan banner through /clan admin setbanner.
    default: op
  clans.admin.disband:
    description: Allows force-disbanding any clan through /clan admin disband.
    default: op
  clans.admin.bypass.restricted-names:
    description: Bypasses restricted clan name/tag moderation checks.
    default: op
